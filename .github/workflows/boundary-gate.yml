name: Public/Private Boundary Gate

# Fails the build if private-brain concepts leak into this PUBLIC package.
# scripts/check_public_private_boundary.py is vendored from mirra-core-contract;
# keep it byte-identical to the canonical copy there.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  boundary-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Scan repository for private-brain leaks
        run: |
          python scripts/check_public_private_boundary.py .
